name: tes3mp

services:
  tes3mp:
    build:
      context: .
      dockerfile: tes3mp.dockerfile
    ports:
      - "25565:25565/udp"
    stop_grace_period: 30s
    restart: unless-stopped
    volumes:
      - ./container-data:/tes3mp

