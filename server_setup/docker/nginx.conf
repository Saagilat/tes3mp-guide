limit_req_zone $binary_remote_addr zone=mods:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=world:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    # ⚠️ ALL ENDPOINTS DISABLED BY DEFAULT
    #
    # To enable endpoints:
    #   1. Uncomment the desired location blocks below
    #   2. Uncomment the `nginx` service AND/OR the `export` service
    #      in docker-compose.yml as needed
    #   3. Run: docker compose up -d --build
    #
    # /get-mods is a static file served by nginx.
    # /get-world is proxied to the export service (combines player + cell data).

    #UNCOMMENT_TO_ENABLE_GET_MODS#
    #location /get-mods {
    #    limit_req zone=mods burst=1 nodelay;
    #    alias /usr/share/nginx/html/mods.tar.gz;
    #    default_type application/gzip;
    #}

    #UNCOMMENT_TO_ENABLE_GET_WORLD#
    #location /get-world {
    #    limit_req zone=world burst=1 nodelay;
    #    proxy_pass http://export:5000/get-world;
    #}

    location / {
        return 404;
    }
}