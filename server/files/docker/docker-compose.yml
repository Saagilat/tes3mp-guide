name: tes3mp

services:
  tes3mp:
    build:
      context: .
      dockerfile: tes3mp.dockerfile
    ports:
      - "25565:25565/udp"
    restart: unless-stopped
    volumes:
      - ./data/players:/tes3mp/players
      - ./data/cells:/tes3mp/cells

